name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - mobile

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Architecture boundaries
        run: bun run architecture:check

      - name: Webapp lint
        run: bun run --cwd webapp lint

      - name: Deployment and script tests
        run: bun run test:deploy

      - name: Contract tests
        run: bun run test:contracts

      - name: Webapp client tests
        run: bun run test:webapp

      - name: Backend tests
        run: bun run test:backend

      - name: Backend Docker smoke
        run: bun run smoke:backend:docker

      - name: Install Playwright browser
        run: bun run --cwd webapp e2e:install

      - name: Webapp E2E smoke
        run: bun run e2e:webapp
