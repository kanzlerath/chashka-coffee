name: chashka-coffee

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chashka_coffee
      POSTGRES_USER: superuser
      POSTGRES_PASSWORD: superpassword
    ports:
      - "${POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres_18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superuser -d chashka_coffee"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres_test:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: chashka_coffee_test
      POSTGRES_USER: superuser
      POSTGRES_PASSWORD: superpassword
    ports:
      - "${POSTGRES_TEST_PORT:-54330}:5432"
    volumes:
      - postgres_18_test_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superuser -d chashka_coffee_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_18_data:
  postgres_18_test_data:
